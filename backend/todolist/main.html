<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User App</title>
</head>
<body>

    <h2>Add User</h2>
    <input type="text" id="name" placeholder="Enter name">
    <button onclick="addUser()">Add</button>

    <h2>Update User</h2>
    <input type="text" id="old" placeholder="Old name">
    <input type="text" id="new" placeholder="New name">
    <button onclick="updateUser()">Update</button>

    <h2>Delete User</h2>
    <input type="text" id="del" placeholder="Name to delete">
    <button onclick="deleteUser()">Delete</button>

<script>
function addUser(){
    let name = document.getElementById("name").value;

    fetch("http://127.0.0.1:8000/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(data => alert(data.msg));
}


function updateUser(){
    let old = document.getElementById("old").value;
    let newName = document.getElementById("new").value;

    fetch(`http://127.0.0.1:8000/?old=${old}&new=${newName}`, {
        method: "PUT"
    })
    .then(res => res.json())
    .then(data => alert(data.msg));
}


function deleteUser(){
    let name = document.getElementById("del").value;

    fetch(`http://127.0.0.1:8000/?name=${name}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => alert(data.msg));
}
</script>

</body>
</html>
