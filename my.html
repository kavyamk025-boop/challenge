<!DOCTYPE html>
<html>
<head>
    <title>Event Practice</title>
</head>

<body>

<h1 id="text">Hello</h1>
<button id="btn">Click me</button>

<script>
let btn = document.querySelector("#btn")
let text = document.querySelector("#text")

btn.addEventListener("click", function(){
    text.textContent = "Changed!"
})
</script>

</body>
</html>
